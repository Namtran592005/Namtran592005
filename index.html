<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Nam Trần (@Namtran5905) | Bio</title>
    <meta
      name="description"
      content="Bio cá nhân của Nam Trần — Creative • Designer • Technician."
    />
    <link rel="canonical" href="https://tranvohoangnam.id.vn/bio/" />

    <!-- Performance -->
    <link rel="preconnect" href="https://websitecarbon.com" crossorigin />
    <link
      rel="preload"
      as="image"
      href="./src/image/Avatar.avif"
      fetchpriority="high"
    />
    <link rel="icon" href="./src/image/favicon.avif" />
    <link rel="apple-touch-icon" href="./src/image/favicon.avif" />
    <meta
      name="theme-color"
      content="#000000"
      media="(prefers-color-scheme: dark)"
    />
    <meta
      name="theme-color"
      content="#87CEEB"
      media="(prefers-color-scheme: light)"
    />

    <!-- OG tags -->
    <meta property="og:title" content="Nam Trần | Bio" />
    <meta
      property="og:description"
      content="Creative • Designer • Technician. Khám phá các dự án và liên kết."
    />
    <meta property="og:image" content="./src/image/social-preview.avif" />
    <meta property="og:type" content="website" />

    <!-- Styles -->
    <link
      rel="stylesheet"
      href="./src/css/style.css"
      media="print"
      onload="this.media='all'"
    />
    <noscript><link rel="stylesheet" href="./src/css/style.css" /></noscript>
  </head>
  <body>
    <!-- Container cho tất cả các hiệu ứng động của giao diện sáng -->
    <div id="light-theme-dynamics"></div>

    <!-- Nút chuyển đổi Sáng/Tối -->
    <button id="theme-toggle-button" aria-label="Toggle light and dark mode">
      <svg
        class="sun-icon"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
      </svg>
      <svg
        class="moon-icon"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
    </button>

    <main class="container">
      <!-- Header -->
      <header class="profile-header">
        <div class="avatar">
          <img
            src="./src/image/Avatar.avif"
            alt="Nam Trần Avatar"
            width="280"
            height="280"
            decoding="async"
            fetchpriority="high"
            loading="eager"
          />
        </div>
        <h1 class="name">Nam Trần</h1>
        <p class="username">@Namtran5905</p>
        <p class="bio-text">Creative • Designer • Technician</p>
      </header>

      <!-- Links -->
      <nav class="links-container">
        <!-- Instagram -->
        <a
          href="https://www.instagram.com/namtran5905"
          target="_blank"
          rel="noopener"
          class="link-item instagram"
        >
          <div class="link-icon">
            <img
              src="./src/image/icons/instagram.png"
              alt="Instagram Icon"
              width="24"
              height="24"
            />
          </div>
          <div class="link-content">
            <span class="link-title">Instagram</span>
            <span class="link-subtitle">Daily updates</span>
          </div>
        </a>
        <!-- TikTok -->
        <a
          href="https://www.tiktok.com/@namtran5905"
          target="_blank"
          rel="noopener"
          class="link-item tiktok"
        >
          <div class="link-icon">
            <img
              src="./src/image/icons/tiktok.png"
              alt="TikTok Icon"
              width="24"
              height="24"
            />
          </div>
          <div class="link-content">
            <span class="link-title">TikTok</span>
            <span class="link-subtitle">Short videos</span>
          </div>
        </a>
        <!-- Facebook -->
        <a
          href="https://fb.com/namtran5905"
          target="_blank"
          rel="noopener"
          class="link-item facebook"
        >
          <div class="link-icon">
            <img
              src="./src/image/icons/facebook.png"
              alt="Facebook Icon"
              width="24"
              height="24"
            />
          </div>
          <div class="link-content">
            <span class="link-title">Facebook</span>
            <span class="link-subtitle">Add me</span>
          </div>
        </a>
        <!-- Threads -->
        <a
          href="https://www.threads.net/@namtran5905"
          target="_blank"
          rel="noopener"
          class="link-item threads"
        >
          <div class="link-icon">
            <img
              src="./src/image/icons/threads.png"
              alt="Threads Icon"
              width="24"
              height="24"
            />
          </div>
          <div class="link-content">
            <span class="link-title">Threads</span>
            <span class="link-subtitle">Follow me</span>
          </div>
        </a>
        <!-- Zalo -->
        <a
          href="https://zaloapp.com/qr/p/1re1dklrzok69"
          target="_blank"
          rel="noopener"
          class="link-item zalo"
        >
          <div class="link-icon">
            <img
              src="./src/image/icons/zalo.png"
              alt="Zalo Icon"
              width="24"
              height="24"
            />
          </div>
          <div class="link-content">
            <span class="link-title">Zalo</span>
            <span class="link-subtitle">Kết nối qua Zalo</span>
          </div>
        </a>
        <!-- Website -->
        <a
          href="../airport/"
          target="_blank"
          rel="noopener"
          class="link-item website"
        >
          <div class="link-icon">
            <img
              src="./src/image/icons/website.png"
              alt="Website Icon"
              width="24"
              height="24"
            />
          </div>
          <div class="link-content">
            <span class="link-title">Website</span>
            <span class="link-subtitle">Portfolio & blog</span>
          </div>
        </a>
      </nav>

      <!-- Footer -->
      <footer class="footer">
        <div id="carbon-badge-container" style="min-height: 50px"></div>
        <p>Made with ❤️ · Optimized for 🌍</p>
      </footer>
    </main>

    <!-- Scripts -->
    <script src="./src/js/script.js" type="module" defer></script>
  </body>
</html>
